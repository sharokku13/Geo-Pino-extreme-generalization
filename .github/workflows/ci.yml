name: Code Quality and Pipeline Verification
#sharokku
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Core SciML Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy scipy matplotlib pyvista
        pip install nbconvert ipykernel

    - name: Lint and Syntax Check Notebooks
      run: |
        python -m compileall .
